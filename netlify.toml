[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Proxy /api/upload-prescription to the Netlify Function (must be before the SPA catch-all)
[[redirects]]
  from = "/api/upload-prescription"
  to = "/.netlify/functions/upload-prescription"
  status = 200
  force = true

# SPA routing — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
